<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Mining Pool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <h1>⚡ ALPHA MINING POOL</h1>
        <div class="balance-card">
            <span class="label">Твой баланс (USDT):</span>
            <span class="value" id="balance">0.00</span>
        </div>
        <div class="profit-card">
            <span class="label">Прибыль за сегодня:</span>
            <span class="value" id="profit">+12.45</span>
        </div>
        <canvas id="chart" width="300" height="150"></canvas>
        <div class="buttons">
            <button id="depositBtn" class="btn primary">💳 Пополнить</button>
            <button id="withdrawBtn" class="btn secondary">📤 Вывести</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
